name = "noim-prep"
main = "src/index.tsx"
compatibility_date = "2025-02-01"
account_id = "60ef6bd2c48d5beb6fd6a093cff863cf"

[[rules]]
type = "Data"
globs = ["**/*.pdf"]
fallthrough = false

[[rules]]
type = "Text"
