fallthrough = false

# KV namespace for temporary PDF storage
# Run: wrangler kv namespace create noim-pdfs
# Then update the id below
[[kv_namespaces]]
binding = "KV"
id = "307c6cacc30f4c2bacf68a0e3fa24667"
